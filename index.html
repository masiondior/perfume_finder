<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfume Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">

  <header>
    <h1>Perfume Log</h1>
    <p>향수 시향기 검색</p>
  </header>

  <div class="search-box">
    <div class="search-wrap">
      <input id="search" type="text" placeholder="향수 이름을 입력하세요" autocomplete="off">
      <button id="clear-btn" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="toolbar">
    <p id="count"></p>
    <button id="random-btn" onclick="openRandom()">🎲 랜덤 시향기</button>
  </div>

  <div id="result" class="grid"></div>

</div>

<script src="script.js"></script>

</body>
</html>
